<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Academic homepage of Huaizhi Qu, HKUST PhD student working on foundation models, multimodal learning, 3D vision, and neural rendering."
    />
    <title>Huaizhi Qu</title>
    <style>
      /* Prevent flash: set initial bg based on saved color mode */
      html { background: #1a202c; }
      html[data-theme="light"] { background: #f7fafc; }
    </style>
    <script>
      try {
        var m = localStorage.getItem('chakra-ui-color-mode') || 'dark';
        document.documentElement.setAttribute('data-theme', m);
        document.documentElement.style.colorScheme = m;
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
