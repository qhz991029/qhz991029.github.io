<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Academic homepage of Huaizhi Qu, HKUST PhD student working on foundation models, multimodal learning, 3D vision, and neural rendering."
    />
    <title>Huaizhi Qu</title>
    <script>
      (function(){
        try {
          var stored = localStorage.getItem('chakra-ui-color-mode');
          var m = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', m);
          document.documentElement.style.colorScheme = m;
          document.documentElement.className = m === 'dark' ? 'chakra-ui-dark' : 'chakra-ui-light';
        } catch(e) {}
      })();
    </script>
    <style>
      :root {
        --bg-color: #f8f9fa;
        --text-color: #212529;
        --heading-color: #212529;
        --secondary-text: #6c757d;
        --muted-color: #adb5bd;
        --accent-color: #3a86ff;
        --accent-light: rgba(58, 134, 255, 0.1);
        --accent-bg: #ebf5ff;
        --border-color: #dee2e6;
        --divider-color: #e9ecef;
        --card-bg: #ffffff;
        --header-bg: #f1f3f5;
        --hover-color: #e9ecef;
        --tag-bg: #e9ecef;
      }
      .chakra-ui-dark, [data-theme='dark'] {
        --bg-color: #0d1117;
        --text-color: #c9d1d9;
        --heading-color: #e6edf3;
        --secondary-text: #8b949e;
        --muted-color: #6e7681;
        --accent-color: #58a6ff;
        --accent-light: rgba(88,166,255,0.15);
        --accent-bg: #0c2d6b;
        --border-color: #30363d;
        --divider-color: #21262d;
        --card-bg: #161b22;
        --header-bg: #161b22;
        --hover-color: #21262d;
        --tag-bg: #161b22;
      }
      html, body, #root {
        background: var(--bg-color);
        color: var(--text-color);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
