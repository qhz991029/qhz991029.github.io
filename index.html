<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon.svg" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Academic homepage of Huaizhi Qu, HKUST PhD student working on foundation models, multimodal learning, 3D vision, and neural rendering."
    />
    <title>Huaizhi Qu</title>
    <script>
      (function(){
        try {
          var stored = localStorage.getItem('chakra-ui-color-mode');
          var m = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', m);
          document.documentElement.style.colorScheme = m;
          document.documentElement.className = m === 'dark' ? 'chakra-ui-dark' : 'chakra-ui-light';
        } catch(e) {}
      })();
    </script>
    <style>
      html { background: #f8f9fa; color: #212529; }
      html.chakra-ui-dark { background: #0d1117; color: #c9d1d9; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
